version: "3.8"

services:
  backend:
    build: .
    ports:
      - "1002:4000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Lệnh này giúp backend chờ DB khởi động xong mới chạy (tránh crash)
    restart: always 
    command: npm run dev
    environment:
      - PORT=4000
      # QUAN TRỌNG: Ghi đè biến DATABASE_URL để trỏ đúng vào service 'db'
      # Trong Docker, host không phải là localhost mà là tên service (db)
      - DATABASE_URL=postgresql://postgres:123456@db:5432/knowledge_sharing?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json

  db:
    image: postgres:16-alpine
    container_name: knowledge_db_container # Đặt tên cho dễ tìm
    restart: always
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c effective_cache_size=1GB
      -c random_page_cost=1.1
      -c synchronous_commit=off
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: knowledge_sharing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_sharing"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: knowledge_redis_container
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  worker:
    build: .
    container_name: knowledge_worker_container
    command: npm run worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:123456@db:5432/knowledge_sharing?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379

volumes:
  postgres_data:
  redis_data: